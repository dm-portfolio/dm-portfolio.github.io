<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groq LLM Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    #chat {
      width: 100%;
      max-width: 600px;
      height: 400px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      background: #1a1a1a;
      margin-bottom: 10px;
    }

    .user { color: #4caf50; }
    .bot { color: #00bcd4; }

    .input-area {
      display: flex;
      width: 100%;
      max-width: 600px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px 0 0 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<h2>My Groq Chatbot</h2>

<div id="chat"></div>

<div class="input-area">
  <input id="message" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = "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";

async function sendMessage() {
  const input = document.getElementById("message");
  const chat = document.getElementById("chat");

  const userMessage = input.value.trim();
  if (!userMessage) return;

  chat.innerHTML += `<p class="user"><strong>You:</strong> ${userMessage}</p>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "llama3-70b-8192",
        messages: [
          { role: "system", content: "You are a helpful assistant." },
          { role: "user", content: userMessage }
        ]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;

    chat.innerHTML += `<p class="bot"><strong>Bot:</strong> ${reply}</p>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (error) {
    chat.innerHTML += `<p class="bot"><strong>Error:</strong> Something went wrong.</p>`;
  }
}
</script>

</body>
</html>
